services:
  # Servicio 1: Nuestra base de datos Híbrida (Grafo + Vector)
  neo4j_db:
    image: neo4j:5
    container_name: code_rag_neo4j
    ports:
      - "7474:7474" # Interfaz Web (Browser)
      - "7687:7687" # Protocolo Bolt (Para conexiones de código)
    environment:
      - NEO4J_AUTH=neo4j/password_seguro
      - NEO4J_PLUGINS=["apoc"] # Vital para integraciones complejas de grafos
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Servicio 2: Nuestro Backend RAG
  api:
    build: .
    container_name: code_rag_api
    ports:
      - "8000:8000"
    environment:
      # Conectamos la API al host interno de docker (neo4j_db)
      - NEO4J_URI=bolt://neo4j_db:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password_seguro
      # Estas variables las tomará de tu archivo .env local
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      neo4j_db:
        condition: service_healthy # Espera a que Neo4j esté 100% listo antes de levantar la API

volumes:
  neo4j_data: # Volumen persistente para no perder el grafo al apagar Docker
